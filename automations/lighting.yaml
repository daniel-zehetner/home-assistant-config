# Automations — lighting
# Generated from live HA entities. Fill in triggers/conditions/actions.

- id: lights_on_at_sunset
  alias: Lights on at sunset
  description: Turn on all lights 30 min before sunset
  trigger:
    - platform: sun
      event: sunset
      offset: "-00:30:00"
  condition: []
  action:
    - action: light.turn_on
      target:
        entity_id:
          - light.nachttischlampe_rechts
          - light.nachtischhlampe_links
          - light.schlafzimmer
          - light.knx_interface_schalten_licht_terasse
          - light.knx_interface_schalten_licht_poolrand
          - light.knx_interface_schalten_licht_pool
          - light.knx_interface_schalten_licht_weg
          - light.knx_interface_licht_abstellraum_schalten
          - light.knx_interface_licht_nebenraum
          - light.knx_interface_licht_terasse
      data:
        brightness_pct: 80
  mode: single

- id: lights_off_at_midnight
  alias: Lights off at midnight
  description: Turn off all lights at midnight
  trigger:
    - platform: time
      at: "00:00:00"
  condition: []
  action:
    - action: light.turn_off
      target:
        entity_id:
          - light.nachttischlampe_rechts
          - light.nachtischhlampe_links
          - light.schlafzimmer
          - light.knx_interface_schalten_licht_terasse
          - light.knx_interface_schalten_licht_poolrand
          - light.knx_interface_schalten_licht_pool
          - light.knx_interface_schalten_licht_weg
          - light.knx_interface_licht_abstellraum_schalten
          - light.knx_interface_licht_nebenraum
          - light.knx_interface_licht_terasse
  mode: single

