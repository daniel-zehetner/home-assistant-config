  # ════════════════════════════════════════════════════════════════════════════
  # VIEW 5 — Photovoltaik
  # ════════════════════════════════════════════════════════════════════════════
  - title: Photovoltaik
    icon: mdi:solar-power-variant
    cards:

      # ── Current power flow overview ────────────────────────────────────────
      - type: glance
        title: Aktuelle Leistung
        show_name: true
        show_icon: true
        show_state: true
        columns: 4
        entities:
          - entity: sensor.solarnet_pv_leistung
            name: PV
            icon: mdi:solar-power
          - entity: sensor.solarnet_leistung_verbrauch
            name: Verbrauch
            icon: mdi:home-lightning-bolt
          - entity: sensor.solarnet_leistung_netzbezug
            name: Netzbezug
            icon: mdi:transmission-tower-import
          - entity: sensor.solarnet_leistung_netzeinspeisung
            name: Einspeisung
            icon: mdi:transmission-tower-export

      # ── Power gauges ───────────────────────────────────────────────────────
      - type: grid
        columns: 2
        square: false
        cards:
          - type: gauge
            entity: sensor.solarnet_pv_leistung
            name: PV Leistung
            min: 0
            max: 10000
            needle: true
            severity:
              green: 4000
              yellow: 1000
              red: 0

          - type: gauge
            entity: sensor.solarnet_leistung_verbrauch
            name: Hausverbrauch
            min: 0
            max: 10000
            needle: true
            severity:
              green: 0
              yellow: 3000
              red: 6000

          - type: gauge
            entity: sensor.solarnet_autarkiegrad
            name: Autarkiegrad
            min: 0
            max: 100
            needle: true
            severity:
              green: 70
              yellow: 30
              red: 0

          - type: gauge
            entity: sensor.solarnet_relativer_eigenverbrauch
            name: Eigenverbrauch
            min: 0
            max: 100
            needle: true
            severity:
              green: 70
              yellow: 30
              red: 0

      # ── Energy totals (kWh) ────────────────────────────────────────────────
      - type: entities
        title: Energiezähler
        icon: mdi:lightning-bolt
        entities:
          - entity: sensor.pv_gesamtertrag_kwh
            name: PV Gesamtertrag
            icon: mdi:solar-power
          - entity: sensor.netzeinspeisung_gesamt_kwh
            name: Eingespeiste Energie
            icon: mdi:transmission-tower-export
          - entity: sensor.netzbezug_gesamt_kwh
            name: Bezogene Energie
            icon: mdi:transmission-tower-import
          - entity: sensor.smart_meter_ts_65a_3_wirkleistung
            name: Aktuelle Wirkleistung
            icon: mdi:meter-electric

      # ── Power history chart ────────────────────────────────────────────────
      - type: history-graph
        title: Leistung (48h)
        hours_to_show: 48
        logarithmic_scale: false
        entities:
          - entity: sensor.solarnet_pv_leistung
            name: PV
          - entity: sensor.solarnet_leistung_verbrauch
            name: Verbrauch
          - entity: sensor.solarnet_leistung_netzbezug
            name: Netzbezug
          - entity: sensor.solarnet_leistung_netzeinspeisung
            name: Einspeisung

      # ── Energy statistics charts ───────────────────────────────────────────
      - type: statistics-graph
        title: Tagesertrag PV (kWh)
        period: day
        stat_types:
          - change
        entities:
          - entity: sensor.pv_gesamtertrag_kwh
            name: PV Ertrag

      - type: statistics-graph
        title: Netzbezug & Einspeisung (kWh)
        period: day
        stat_types:
          - change
        entities:
          - entity: sensor.netzbezug_gesamt_kwh
            name: Netzbezug
          - entity: sensor.netzeinspeisung_gesamt_kwh
            name: Einspeisung

      # ── Inverter + Smart Meter details ─────────────────────────────────────
      - type: grid
        columns: 2
        square: false
        cards:
          - type: entities
            title: Wechselrichter
            icon: mdi:chip
            entities:
              - entity: sensor.pv_zehetner_daniel_wechselrichterstatus
                name: Status
              - entity: sensor.pv_zehetner_daniel_statusnachricht
                name: Meldung
              - entity: sensor.pv_zehetner_daniel_leistung_ac
                name: Leistung AC
              - entity: sensor.pv_zehetner_daniel_spannung_dc
                name: Spannung DC
              - entity: sensor.pv_zehetner_daniel_stromstarke_dc
                name: Strom DC
              - entity: sensor.pv_zehetner_daniel_dc_spannung_2
                name: Spannung DC 2
              - entity: sensor.pv_zehetner_daniel_dc_stromstarke_2
                name: Strom DC 2

          - type: entities
            title: Smart Meter
            icon: mdi:meter-electric-outline
            entities:
              - entity: sensor.solarnet_zahlermodus
                name: Zählermodus
              - entity: sensor.smart_meter_ts_65a_3_zahlerposition
                name: Position
              - entity: sensor.smart_meter_ts_65a_3_netzfrequenz
                name: Netzfrequenz
              - entity: sensor.smart_meter_ts_65a_3_leistungsfaktor
                name: Leistungsfaktor
