bewaesserung_programm:
  alias: "Bewässerung Programm"
  description: >
    Runs all enabled watering cycles sequentially.
    Each cycle uses its configured duration from input_number helpers.
  icon: mdi:watering-can
  mode: single

  sequence:
    # ── Kreis 1: Haus Vorne ────────────────────────────────────────────────────
    - if:
        - condition: state
          entity_id: input_boolean.bewaesserung_kreis_1_aktiv
          state: "on"
      then:
        - action: switch.turn_on
          target:
            entity_id: switch.bewasserung_haus_vorne
        - delay:
            minutes: "{{ states('input_number.bewaesserung_kreis_1_dauer') | int }}"
        - action: switch.turn_off
          target:
            entity_id: switch.bewasserung_haus_vorne

    # ── Kreis 2: Terasse Links ─────────────────────────────────────────────────
    - if:
        - condition: state
          entity_id: input_boolean.bewaesserung_kreis_2_aktiv
          state: "on"
      then:
        - action: switch.turn_on
          target:
            entity_id: switch.bewasserung_terasse_links
        - delay:
            minutes: "{{ states('input_number.bewaesserung_kreis_2_dauer') | int }}"
        - action: switch.turn_off
          target:
            entity_id: switch.bewasserung_terasse_links

    # ── Kreis 3: Terasse Rechts ────────────────────────────────────────────────
    - if:
        - condition: state
          entity_id: input_boolean.bewaesserung_kreis_3_aktiv
          state: "on"
      then:
        - action: switch.turn_on
          target:
            entity_id: switch.bewasserung_terasse_rechts
        - delay:
            minutes: "{{ states('input_number.bewaesserung_kreis_3_dauer') | int }}"
        - action: switch.turn_off
          target:
            entity_id: switch.bewasserung_terasse_rechts

    # ── Kreis 4: Links Mitte ───────────────────────────────────────────────────
    - if:
        - condition: state
          entity_id: input_boolean.bewaesserung_kreis_4_aktiv
          state: "on"
      then:
        - action: switch.turn_on
          target:
            entity_id: switch.bewasserung_links_mitte
        - delay:
            minutes: "{{ states('input_number.bewaesserung_kreis_4_dauer') | int }}"
        - action: switch.turn_off
          target:
            entity_id: switch.bewasserung_links_mitte

    # ── Kreis 5: Links Hinten ──────────────────────────────────────────────────
    - if:
        - condition: state
          entity_id: input_boolean.bewaesserung_kreis_5_aktiv
          state: "on"
      then:
        - action: switch.turn_on
          target:
            entity_id: switch.bewasserung_links_hinten
        - delay:
            minutes: "{{ states('input_number.bewaesserung_kreis_5_dauer') | int }}"
        - action: switch.turn_off
          target:
            entity_id: switch.bewasserung_links_hinten

    # ── Kreis 6: Garage Vorne ──────────────────────────────────────────────────
    - if:
        - condition: state
          entity_id: input_boolean.bewaesserung_kreis_6_aktiv
          state: "on"
      then:
        - action: switch.turn_on
          target:
            entity_id: switch.bewasserung_garage_vorne
        - delay:
            minutes: "{{ states('input_number.bewaesserung_kreis_6_dauer') | int }}"
        - action: switch.turn_off
          target:
            entity_id: switch.bewasserung_garage_vorne

    # ── Kreis 7: Garage Seitlich ───────────────────────────────────────────────
    - if:
        - condition: state
          entity_id: input_boolean.bewaesserung_kreis_7_aktiv
          state: "on"
      then:
        - action: switch.turn_on
          target:
            entity_id: switch.bewasserung_garage_seitlich
        - delay:
            minutes: "{{ states('input_number.bewaesserung_kreis_7_dauer') | int }}"
        - action: switch.turn_off
          target:
            entity_id: switch.bewasserung_garage_seitlich

    # ── Kreis 8: Rechts Hinten ─────────────────────────────────────────────────
    - if:
        - condition: state
          entity_id: input_boolean.bewasserung_rechts_hinten_aktiv
          state: "on"
      then:
        - action: switch.turn_on
          target:
            entity_id: switch.bewasserung_rechts_hinten
        - delay:
            minutes: "{{ states('input_number.bewasserung_rechts_hinten_dauer') | int }}"
        - action: switch.turn_off
          target:
            entity_id: switch.bewasserung_rechts_hinten


# ── Individual cycle trigger scripts ──────────────────────────────────────────
# Each runs one valve for its configured duration regardless of the enable toggle.

bewaesserung_kreis_1_manuell:
  alias: "Bewässerung Haus Vorne manuell"
  icon: mdi:watering-can-outline
  mode: single
  sequence:
    - action: switch.turn_on
      target:
        entity_id: switch.bewasserung_haus_vorne
    - delay:
        minutes: "{{ states('input_number.bewaesserung_kreis_1_dauer') | int }}"
