bewaesserung_programm:
  config:
    alias: Bewässerung Programm
    icon: mdi:watering-can
    mode: single
    sequence:
    - if:
      - condition: state
        entity_id: input_boolean.bewasserung_haus_vorne_aktiv
        state: 'on'
      then:
      - action: knx.send
        data:
          address: 4/1/0
          payload: 1
          type: '1.001'
      - delay:
          minutes: '{{ states(''input_number.bewasserung_haus_vorne_dauer'') | int
            }}'
      - action: knx.send
        data:
          address: 4/1/0
          payload: 0
          type: '1.001'
    - if:
      - condition: state
        entity_id: input_boolean.bewasserung_terasse_links_aktiv
        state: 'on'
      then:
      - action: knx.send
        data:
          address: 4/1/1
          payload: 1
          type: '1.001'
      - delay:
          minutes: '{{ states(''input_number.bewasserung_terasse_links_dauer'') |
            int }}'
      - action: knx.send
        data:
          address: 4/1/1
          payload: 0
          type: '1.001'
    - if:
      - condition: state
        entity_id: input_boolean.bewasserung_terasse_rechts_aktiv
        state: 'on'
      then:
      - action: knx.send
        data:
          address: 4/1/2
          payload: 1
          type: '1.001'
      - delay:
          minutes: '{{ states(''input_number.bewasserung_terasse_rechts_dauer'') |
            int }}'
      - action: knx.send
        data:
          address: 4/1/2
          payload: 0
          type: '1.001'
    - if:
      - condition: state
        entity_id: input_boolean.bewasserung_links_mitte_aktiv
        state: 'on'
      then:
      - action: knx.send
        data:
          address: 4/1/3
          payload: 1
          type: '1.001'
      - delay:
          minutes: '{{ states(''input_number.bewasserung_links_mitte_dauer'') | int
            }}'
      - action: knx.send
        data:
          address: 4/1/3
          payload: 0
          type: '1.001'
    - if:
      - condition: state
        entity_id: input_boolean.bewasserung_links_hinten_aktiv
        state: 'on'
      then:
      - action: knx.send
        data:
          address: 4/1/4
          payload: 1
          type: '1.001'
      - delay:
          minutes: '{{ states(''input_number.bewasserung_links_hinten_dauer'') | int
            }}'
      - action: knx.send
        data:
          address: 4/1/4
          payload: 0
          type: '1.001'
    - if:
      - condition: state
        entity_id: input_boolean.bewasserung_garage_vorne_aktiv
        state: 'on'
      then:
      - action: knx.send
        data:
          address: 4/1/5
          payload: 1
          type: '1.001'
      - delay:
          minutes: '{{ states(''input_number.bewasserung_garage_vorne_dauer'') | int
            }}'
      - action: knx.send
        data:
          address: 4/1/5
          payload: 0
          type: '1.001'
    - if:
      - condition: state
        entity_id: input_boolean.bewasserung_garage_seitlich_aktiv
        state: 'on'
      then:
      - action: knx.send
        data:
          address: 4/1/6
          payload: 1
          type: '1.001'
      - delay:
          minutes: '{{ states(''input_number.bewasserung_garage_seitlich_dauer'')
            | int }}'
      - action: knx.send
        data:
          address: 4/1/6
          payload: 0
          type: '1.001'
