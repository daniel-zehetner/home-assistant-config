bewaesserung_alle_stoppen:
  config:
    alias: Bewässerung alle stoppen
    icon: mdi:stop-circle-outline
    mode: single
    sequence:
    - action: knx.send
      data:
        address: 4/1/0
        payload: 0
        type: '1.001'
    - action: knx.send
      data:
        address: 4/1/1
        payload: 0
        type: '1.001'
    - action: knx.send
      data:
        address: 4/1/2
        payload: 0
        type: '1.001'
    - action: knx.send
      data:
        address: 4/1/3
        payload: 0
        type: '1.001'
    - action: knx.send
      data:
        address: 4/1/4
        payload: 0
        type: '1.001'
    - action: knx.send
      data:
        address: 4/1/5
        payload: 0
        type: '1.001'
    - action: knx.send
      data:
        address: 4/1/6
        payload: 0
        type: '1.001'
    - action: knx.send
      data:
        address: 4/1/7
        payload: 0
        type: '1.001'
    - action: script.turn_off
      target:
        entity_id:
          - script.bewaesserung_programm
          - script.bewaesserung_haus_vorne_manuell
          - script.bewaesserung_terasse_links_manuell
          - script.bewaesserung_terasse_rechts_manuell
          - script.bewaesserung_links_mitte_manuell
          - script.bewaesserung_links_hinten_manuell
          - script.bewaesserung_garage_vorne_manuell
          - script.bewaesserung_garage_seitlich_manuell
          - script.bewaesserung_rechts_hinten_manuell
bewaesserung_garage_seitlich_manuell:
  config:
    alias: Bewässerung Garage Seitlich manuell
    icon: mdi:watering-can-outline
    mode: single
    sequence:
    - action: knx.send
      data:
        address: 4/1/6
        payload: 1
        type: '1.001'
    - delay:
        minutes: '{{ states(''input_number.bewasserung_garage_seitlich_dauer'') |
          int }}'
    - action: knx.send
      data:
        address: 4/1/6
        payload: 0
        type: '1.001'
