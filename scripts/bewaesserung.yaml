bewaesserung_alle_stoppen:
  alias: "Bewässerung alle stoppen"
  description: "Emergency stop — turns off all valves immediately."
  icon: mdi:stop-circle-outline
  mode: single

  sequence:
    - action: switch.turn_off
      target:
        entity_id:
          - switch.bewasserung_haus_vorne
          - switch.bewasserung_terasse_links
          - switch.bewasserung_terasse_rechts
          - switch.bewasserung_links_mitte
          - switch.bewasserung_links_hinten
          - switch.bewasserung_garage_vorne
          - switch.bewasserung_garage_seitlich
          - switch.bewasserung_rechts_hinten
    - action: script.turn_off
      target:
        entity_id: script.bewaesserung_programm
